name = "scanslop"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Replace with your domain
routes = [
  { pattern = "yourdomain.com/*", zone_name = "yourdomain.com" }
]

# D1 database for analytics. Create with: wrangler d1 create scanslop-analytics
[[d1_databases]]
binding = "DB"
database_name = "scanslop-analytics"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# KV namespace for static assets. Create with: wrangler kv namespace create ASSETS
[[kv_namespaces]]
binding = "ASSETS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
